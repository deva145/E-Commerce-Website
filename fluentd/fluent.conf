<source>
  @type tail
  path /fluentd/logs/application.log
  pos_file /fluentd/logs/application.pos
  tag spring.logs
  read_from_head true
  <parse>
    @type json
    time_format %iso8601
  </parse>
</source>

<match spring.logs>
  @type elasticsearch
  host elasticsearch
  port 9200
  scheme http
  ssl_verify false
  logstash_format true
  logstash_prefix springboot
  <buffer>
    flush_interval 10s
  </buffer>
</match>